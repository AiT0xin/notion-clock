<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clock</title>
<style>
  :root {
    /* Timezone offset in hours. +8 = Singapore / Asia (GMT+8). Change if needed. */
    --tz-offset: 8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #1b1a19;            /* dark, slightly warm — blends with Notion dark mode */
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    user-select: none;
  }

  /* ---- clock row ---- */
  .clock {
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
  }

  .card {
    position: relative;
    width: 118px;
    height: 144px;
    border-radius: 16px;
    background: linear-gradient(#efeeec 0 50%, #dcdad7 50% 100%);
    box-shadow: 0 10px 24px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.6);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* the flip-clock seam across the middle */
  .card::after {
    content: "";
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 2px;
    transform: translateY(-1px);
    background: rgba(0,0,0,.14);
  }
  .card span {
    font-size: 92px;
    font-weight: 600;
    color: #29282b;
    line-height: 1;
    letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
  }

  /* ---- blinking colon ---- */
  .colon {
    display: flex;
    flex-direction: column;
    gap: 22px;
    padding: 0 4px;
  }
  .colon b {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #f1efec;
    display: block;
    transition: opacity .15s ease;
  }
  .colon.off b { opacity: .18; }

  /* ---- +08 tag ---- */
  .tz {
    position: absolute;
    right: -34px;
    bottom: 6px;
    color: #f1efec;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: .3px;
  }

  /* ---- date line ---- */
  .date {
    font-family: Georgia, "Times New Roman", serif;
    color: #f3f1ee;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: .3px;
  }

  /* ---- timezone switcher ---- */
  .zones {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .zones button {
    background: transparent;
    border: 1px solid rgba(255,255,255,.18);
    color: #b9b7b3;
    font-family: inherit;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .zones button:hover { border-color: rgba(255,255,255,.45); color: #f1efec; }
  .zones button.active {
    background: #f1efec;
    color: #1b1a19;
    border-color: #f1efec;
  }

  @media (max-width: 380px) {
    .card { width: 92px; height: 116px; }
    .card span { font-size: 72px; }
    .tz { right: -30px; font-size: 13px; }
    .date { font-size: 17px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="clock">
      <div class="card"><span id="hh">10</span></div>
      <div class="colon" id="colon"><b></b><b></b></div>
      <div class="card">
        <span id="mm">28</span>
        <div class="tz" id="tz">+08</div>
      </div>
    </div>
    <div class="date" id="date">Saturday | June 27, 2026</div>

    <div class="zones" id="zones">
      <button data-off="8">+08</button>
      <button data-off="10">+10</button>
      <button data-off="0" data-label="UTC">UTC</button>
      <button data-off="-4">&minus;04</button>
      <button data-gmt="true">GMT</button>
    </div>
  </div>

<script>
  var WEEK = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var MON  = ["January","February","March","April","May","June","July",
              "August","September","October","November","December"];

  var SYNC_EVERY = 5 * 60 * 1000;  // re-sync with atomic time every 5 minutes
  var driftMs = 0;                 // (true UTC now) − (this device's clock)

  // true if the UK is currently on BST (last Sun Mar → last Sun Oct, UTC+1)
  function ukOffset() {
    var now = new Date();
    var yr  = now.getUTCFullYear();
    function lastSun(month) {
      // find last Sunday of given UTC month (0-indexed)
      var d = new Date(Date.UTC(yr, month + 1, 0)); // last day of month
      d.setUTCDate(d.getUTCDate() - d.getUTCDay()); // back to Sunday
      return d;
    }
    var bstStart = lastSun(2); bstStart.setUTCHours(1); // last Sun March 01:00 UTC
    var bstEnd   = lastSun(9); bstEnd.setUTCHours(1);   // last Sun October 01:00 UTC
    return (now >= bstStart && now < bstEnd) ? 1 : 0;   // BST=+1, GMT=+0
  }

  var useGMT = false;  // true when the GMT pill is active

  // Selected timezone. Persisted as a number, or the string "gmt".
  var currentOffset = (function(){
    var saved;
    try { saved = localStorage.getItem('clockOffset'); } catch (e) {}
    if (saved === 'gmt') { useGMT = true; return ukOffset(); }
    var n = parseFloat(saved);
    if (!isNaN(n)) return n;
    var css = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--tz-offset'));
    return isNaN(css) ? 8 : css;
  })();

  function offset() { return useGMT ? ukOffset() : currentOffset; }

  function updatePills(activeBtn) {
    var btns = document.querySelectorAll('#zones button');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
    if (activeBtn) activeBtn.classList.add('active');
  }

  function setOffset(o, btn) {
    useGMT = false;
    currentOffset = o;
    try { localStorage.setItem('clockOffset', o); } catch (e) {}
    updatePills(btn);
    tick();
  }

  function setGMT(btn) {
    useGMT = true;
    try { localStorage.setItem('clockOffset', 'gmt'); } catch (e) {}
    updatePills(btn);
    tick();
  }

  function pad(n){ return (n < 10 ? "0" : "") + n; }

  // Corrected UTC milliseconds — device clock plus the measured drift.
  function nowUTC(){ return Date.now() + driftMs; }

  function tick() {
    var off = offset();
    // shift corrected UTC by the offset, then read the UTC fields back out
    var t = new Date(nowUTC() + off * 3600000);

    document.getElementById("hh").textContent = pad(t.getUTCHours());
    document.getElementById("mm").textContent = pad(t.getUTCMinutes());

    var label;
    if (useGMT) {
      label = (off === 0) ? "GMT" : "BST";
    } else if (off === 0) {
      label = "UTC";
    } else {
      label = (off > 0 ? "+" : "−") + pad(Math.abs(off));
    }
    document.getElementById("tz").textContent = label;

    document.getElementById("date").textContent =
      WEEK[t.getUTCDay()] + " | " + MON[t.getUTCMonth()] + " " +
      t.getUTCDate() + ", " + t.getUTCFullYear();

    // blink colon each second
    document.getElementById("colon").classList.toggle("off", t.getUTCSeconds() % 2 === 1);
  }

  function parseTimeApi(d){
    if (d && d.year) return Date.UTC(d.year, d.month - 1, d.day, d.hour, d.minute, d.seconds, d.milliSeconds || 0);
    return NaN;
  }

  // Fetch true UTC from a public atomic-time API and store the drift.
  // Tries a backup source; on total failure it just keeps device time.
  async function syncOnce(){
    var sources = [
      { url: 'https://timeapi.io/api/Time/current/zone?timeZone=UTC', parse: parseTimeApi },
      { url: 'https://worldtimeapi.org/api/timezone/Etc/UTC',
        parse: function(d){ return d && d.unixtime ? d.unixtime * 1000 : NaN; } }
    ];
    for (var i = 0; i < sources.length; i++) {
      try {
        var t0 = Date.now();
        var res = await fetch(sources[i].url, { cache: 'no-store' });
        var t1 = Date.now();
        if (!res.ok) continue;
        var data = await res.json();
        var serverMs = sources[i].parse(data);
        if (!serverMs || isNaN(serverMs)) continue;
        // assume the server's timestamp is from roughly mid-flight
        var latency = (t1 - t0) / 2;
        driftMs = (serverMs + latency) - t1;
        return true;
      } catch (e) { /* try the next source */ }
    }
    return false;
  }

  // wire up the timezone pills, then highlight the active one
  var zoneBtns = document.querySelectorAll('#zones button');
  for (var b = 0; b < zoneBtns.length; b++) {
    zoneBtns[b].addEventListener('click', function(){
      if (this.getAttribute('data-gmt')) { setGMT(this); }
      else { setOffset(parseFloat(this.getAttribute('data-off')), this); }
    });
  }

  // restore the correct active pill on load
  if (useGMT) {
    var gmtBtn = document.querySelector('#zones button[data-gmt]');
    updatePills(gmtBtn);
  } else {
    var savedOff = currentOffset;
    var matchBtn = document.querySelector('#zones button[data-off="' + savedOff + '"]');
    updatePills(matchBtn);
  }

  tick();
  setInterval(tick, 1000);

  syncOnce();
  setInterval(syncOnce, SYNC_EVERY);
  // re-sync when the tab comes back into focus (background tabs drift)
  document.addEventListener('visibilitychange', function(){ if (!document.hidden) syncOnce(); });
</script>
</body>
</html>
